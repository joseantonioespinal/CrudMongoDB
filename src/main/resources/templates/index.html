
<!doctype html>
<!-- Documento HTML5 -->
<html xmlns:th="http://www.thymeleaf.org" lang="es" class="h-100" data-bs-theme="dark">
<!-- data-bs-theme="dark" fuerza modo oscuro en Bootstrap -->

<head>
    <!-- Configuración básica -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Información SEO -->
    <meta name="description" content="">
    <meta name="author" content="Bootstrap contributors">

    <title>Gran Sorteo - Anual</title>

    <!-- Bootstrap CSS (IMPORTANTE: este manda estilos base) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

    <!-- CSS personalizado -->
    <link href="cover.css" rel="stylesheet">

    <!-- ==============================
         ESTILOS PERSONALIZADOS
    ============================== -->
    <style>

        /* BOTONES secundarios */
        .btn-secondary,
        .btn-secondary:hover,
        .btn-secondary:focus {
          color: #000; /* Texto negro */
          background-color: #fff; /* Fondo blanco */
          text-shadow: none;
        }

        /* BODY general (efecto oscuro + sombra) */
        body {
          background-color: #121212; /* Fondo negro */
          color: #fff; /* Texto blanco */
          text-shadow: 0 .05rem .1rem rgba(0, 0, 0, .5);
          box-shadow: inset 0 0 5rem rgba(0, 0, 0, .5);
        }

        /* Contenedor principal */
        .cover-container {
          max-width: 42em;
        }

        /* Imagen izquierda (iphone) */
        .iphone {
          width: 25%;
          position: absolute;
          left: 5%;
          transform: rotate(-10deg);
        }

        /* Imagen derecha (apple) */
        .apple {
          width: 25%;
          position: absolute;
          right: 5%;
          transform: rotate(10deg);
        }

        /* ==============================
           NAVBAR
        ============================== */
        .nav-masthead .nav-link {
          color: rgba(255, 255, 255, .6); /* Blanco tenue */
          border-bottom: 2px solid transparent;
        }

        .nav-masthead .nav-link:hover {
          color: #fff;
          border-bottom-color: rgba(255, 255, 255, .5);
        }

        .nav-masthead .active {
          color: #fff;
          border-bottom-color: #fff;
        }

    </style>
</head>


<!-- ==============================
     BODY PRINCIPAL
============================== -->
<body class="d-flex h-100 text-center text-bg-dark bg-dark text-white">
<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">

    <!-- ==============================
         HEADER
    ============================== -->
    <header class="mb-auto">
        <div>

            <!-- Título -->
            <h3 class="float-md-start mb-0">Gran Sorteo</h3>

            <!-- Navegación -->
            <nav class="nav nav-masthead justify-content-center float-md-end">

                <!-- Página actual -->
                <a class="nav-link active" href="#">Home</a>

                <!-- Opciones -->
                <a class="nav-link" href="/personas">Lista de Participantes</a>
                <a class="nav-link" href="/personas/nuevo">Registrarme</a>

            </nav>
        </div>
    </header>


    <!-- ==============================
         CONTENIDO PRINCIPAL
    ============================== -->
    <main class="px-3">

        <!-- Imagen izquierda -->
        <img class="iphone"
             src="https://storage.googleapis.com/alpine-inkwell-325917.appspot.com/devices/ipad-mini-6-header.png">

        <!-- Título -->
        <h1>¡Gran Sorteo!</h1>

        <!-- Descripción -->
        <p class="lead">
            Regístrate y participa por premios valorizados en más de 8000 soles
        </p>

        <!-- Botón -->
        <p class="lead">
            <a href="/personas/nuevo"
               class="btn btn-lg btn-secondary fw-bold border-white bg-white">
                Registrarme
            </a>
        </p>

        <!-- Imagen derecha -->
        <img class="apple"
             src="https://support.apple.com/library/APPLE/APPLECARE_ALLGEOS/SP877/apple-watch-se-2nd-gen.png">

    </main>


    <!-- ==============================
         FOOTER
    ============================== -->
    <footer class="mt-auto text-white-50">
        <p>
            Desarrollada por AA.RR
            <strong>Todos los derechos reservados</strong>
            <code>2024</code>
        </p>
    </footer>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
